<div class="modalCont" (click)="close()">
    <div class="modal" (click)="$event.stopPropagation()">
        <form [formGroup]="investModalForm" (ngSubmit)="addInvest()" class="modalForm">
            <div class="innerForm">
                <label for="capital">Capital to invest:</label>
                <input id="capital" name="capital" type="number" formControlName="capital" min="1"
                    placeholder="Insert capital (min: 1)">
                <label for="buyPriceCont">Buy price:</label>
                <div id="buyPriceCont" class="buyPriceCont">
                    <input name='buyPrice' type="number" formControlName="buyPrice" min="1"
                        placeholder="Insert buy price (min: 1)">
                    <span [innerHTML]="currency"></span>
                </div>
                <label for="buyDate">Buy date:</label>
                <input id="buyDate" name='buyDate' type="datetime-local" formControlName="buyDate">
                <button type="submit">Invest</button>
            </div>
        </form>
    </div>
</div>
